name: PR
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

jobs:
  minio_e2e_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CROSSPLANE_NAMESPACE: crossplane
      CREATE_KIND_CLUSTER: "false"
      INSTALL_CONFIGURATION_PACKAGE: "false"
      KUBECTL_CONTEXT: kind-storage-minio
      KIND_CLUSTER_NAME: storage-minio
      VERIFY_OBJECT_ROUNDTRIP: "true"
      VERIFY_LIFECYCLE: "true"
      LIFECYCLE_WAIT_SECONDS: "75"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: storage-minio

      - name: Set up local MinIO stack
        run: |
          set -euo pipefail
          RUN_EXAMPLE_TESTS=false \
          RUN_LIFECYCLE_TEST=false \
          bash minio/tests/e2e.bash

      - name: Run example Storage e2e tests
        run: |
          set -euo pipefail
          RUN_SETUP=false \
          RUN_EXAMPLE_TESTS=true \
          RUN_LIFECYCLE_TEST=false \
          bash minio/tests/e2e.bash

      - name: Run lifecycle e2e tests
        run: |
          set -euo pipefail
          RUN_SETUP=false \
          RUN_EXAMPLE_TESTS=false \
          RUN_LIFECYCLE_TEST=true \
          bash minio/tests/e2e.bash
