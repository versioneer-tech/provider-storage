apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: storage-minio
  labels:
    provider: minio
spec:
  compositeTypeRef:
    apiVersion: pkg.internal/v1beta1
    kind: Storage
  mode: Pipeline
  pipeline:
    - step: load-storage-environment
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function import request, response, resource
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          ENVIRONMENT_KEY = "apiextensions.crossplane.io/environment"

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              annotations = meta.get("annotations", {}) or {}
              labels = meta.get("labels", {}) or {}
              env_name = (
                  annotations.get("storages.pkg.internal/environment")
                  or labels.get("storages.pkg.internal/environment")
                  or "storage"
              ).strip() or "storage"

              response.require_resources(
                  rsp,
                  name="storage-environment",
                  api_version="apiextensions.crossplane.io/v1beta1",
                  kind="EnvironmentConfig",
                  match_name=env_name,
              )

              environment = request.get_required_resource(req, "storage-environment") or {}
              environment_data = (environment.get("data") or {})
              rsp.context.MergeFrom(resource.dict_to_struct({ENVIRONMENT_KEY: environment_data}))

    - step: create-buckets
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"

              for b in (spec.get("buckets") or []):
                  bucket = (b.get("bucketName") or "").strip()
                  if not bucket:
                      continue
                  discoverable = str(bool(b.get("discoverable", False))).lower()
                  key = f"bucket-{bucket}"
                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": ns,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "minio.crossplane.io/v1",
                                  "kind": "Bucket",
                                  "metadata": {
                                      "name": bucket,
                                      "annotations": {"storages.pkg.internal/discoverable": discoverable}
                                  },
                                  "spec": {
                                      "providerConfigRef": {"name": "provider-minio"}
                                  }
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                      }
                  })

    - step: create-principal-policies
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          import json
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"
              principal = (spec.get("principal") or meta.get("name") or "<principal-missing>").strip()

              for b in (spec.get("buckets") or []):
                  bucket = (b.get("bucketName") or "").strip()
                  if not bucket:
                      continue
                  polname = f"{principal}.{bucket}"
                  key = f"policy-full-{bucket}"
                  raw = json.dumps({
                      "Version": "2012-10-17",
                      "Statement": [{
                          "Effect": "Allow",
                          "Action": ["s3:*"],
                          "Resource": [f"arn:aws:s3:::{bucket}", f"arn:aws:s3:::{bucket}/*"]
                      }]
                  }, indent=2)

                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": ns,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "minio.crossplane.io/v1",
                                  "kind": "Policy",
                                  "metadata": {"name": polname},
                                  "spec": {
                                      "forProvider": {"rawPolicy": raw},
                                      "providerConfigRef": {"name": "provider-minio"}
                                  }
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                      }
                  })

    - step: create-grant-policies
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          import json
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def _raw_policy(bucket, perm):
              p = (perm or "").strip().lower()
              if p == "readwrite":
                  stmt = [{
                      "Effect": "Allow",
                      "Action": ["s3:GetBucketLocation","s3:ListBucket","s3:GetObject","s3:PutObject","s3:DeleteObject"],
                      "Resource": [f"arn:aws:s3:::{bucket}", f"arn:aws:s3:::{bucket}/*"]
                  }]
              elif p == "readonly":
                  stmt = [
                      {"Effect": "Allow","Action": ["s3:GetBucketLocation","s3:ListBucket"],"Resource": [f"arn:aws:s3:::{bucket}"]},
                      {"Effect": "Allow","Action": ["s3:GetObject"],"Resource": [f"arn:aws:s3:::{bucket}/*"]},
                  ]
              elif p == "writeonly":
                  stmt = [
                      {"Effect": "Allow","Action": ["s3:GetBucketLocation","s3:ListBucket"],"Resource": [f"arn:aws:s3:::{bucket}"]},
                      {"Effect": "Allow","Action": ["s3:PutObject","s3:DeleteObject"],"Resource": [f"arn:aws:s3:::{bucket}/*"]},
                  ]
              elif p == "none":
                  stmt = []
              else:
                  stmt = []
              return json.dumps({"Version": "2012-10-17","Statement": stmt}, indent=2)

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"

              for grant in (spec.get("bucketAccessGrants") or []):
                  bucket = (grant.get("bucketName") or "").strip()
                  grantee = (grant.get("grantee") or "").strip()
                  perm = (grant.get("permission") or "").strip()
                  if not bucket or not grantee or not perm:
                      continue

                  raw = _raw_policy(bucket, perm)
                  polname = f"{grantee}.{bucket}"
                  key = f"policy-{grantee}-{bucket}"
                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": ns,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "minio.crossplane.io/v1",
                                  "kind": "Policy",
                                  "metadata": {"name": polname},
                                  "spec": {
                                      "forProvider": {"rawPolicy": raw},
                                      "providerConfigRef": {"name": "provider-minio"}
                                  }
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                      }
                  })

    - step: create-users-with-policies
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from datetime import datetime, timedelta, timezone

          from crossplane.function import request, response
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def _get_rollover(spec: dict) -> tuple[str, int]:
              cfg = (spec.get("credentialsRollover") or {})
              interval = (cfg.get("interval") or "none").strip().lower()
              max_to_keep = cfg.get("maxToKeep")
              if max_to_keep is None:
                  max_to_keep = 1
              try:
                  max_to_keep = int(max_to_keep)
              except Exception:
                  max_to_keep = 1
              if max_to_keep < 1:
                  max_to_keep = 1
              if max_to_keep > 10:
                  max_to_keep = 10
              return interval, max_to_keep

          def _quarter(dt: datetime) -> int:
              return ((dt.month - 1) // 3) + 1

          def _suffixes(now: datetime, interval: str, max_to_keep: int) -> list[str]:
              out = []
              if interval == "daily":
                  for i in range(max_to_keep):
                      d = (now - timedelta(days=i)).date()
                      out.append(d.strftime("%Y%m%d"))
              elif interval == "weekly":
                  for i in range(max_to_keep):
                      d = (now - timedelta(weeks=i)).date()
                      iso = d.isocalendar()
                      out.append(f"{iso.year}w{iso.week:02d}")
              elif interval == "monthly":
                  for i in range(max_to_keep):
                      y = now.year
                      m = now.month - i
                      while m <= 0:
                          y -= 1
                          m += 12
                      out.append(f"{y}{m:02d}")
              elif interval == "quarterly":
                  for i in range(max_to_keep):
                      q_total = (now.year * 4 + (_quarter(now) - 1)) - i
                      y = q_total // 4
                      q = (q_total % 4) + 1
                      out.append(f"{y}q{q}")
              elif interval == "yearly":
                  for i in range(max_to_keep):
                      out.append(str(now.year - i))
              else:
                  for i in range(1, max_to_keep + 1):
                      out.append(str(i))

              return ["-" + s for s in out]

          def _bucket_grants_access(storage: dict, bucket: str, grantee: str) -> bool | None:
              spec = (storage.get("spec") or {})
              owns_bucket = any((b.get("bucketName") or "").strip() == bucket for b in (spec.get("buckets") or []))
              if not owns_bucket:
                  return None

              decision = None
              for grant in (spec.get("bucketAccessGrants") or []):
                  grant_bucket = (grant.get("bucketName") or "").strip()
                  grant_grantee = (grant.get("grantee") or "").strip()
                  permission = (grant.get("permission") or "").strip().lower()
                  if grant_bucket != bucket or grant_grantee != grantee:
                      continue
                  if permission == "none":
                      return False
                  if permission in ("readonly", "writeonly", "readwrite"):
                      decision = True
              return decision

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"

              principal = (spec.get("principal") or meta.get("name") or "<principal-missing>").strip()
              # Peer Storage objects are loaded by a shared label so request resolution can inspect grants.
              response.require_resources(
                  rsp,
                  name="peer-storages",
                  api_version="pkg.internal/v1beta1",
                  kind="Storage",
                  namespace=ns,
                  match_labels={"storages.pkg.internal/discoverable": "true"},
              )
              peer_storages = request.get_required_resources(req, "peer-storages") or []

              policies = []
              for b in (spec.get("buckets") or []):
                  bucket = (b.get("bucketName") or "").strip()
                  if bucket:
                      policies.append(f"{principal}.{bucket}")

              for r in (spec.get("bucketAccessRequests") or []):
                  bucket = (r.get("bucketName") or "").strip()
                  if not bucket:
                      continue
                  granted = None
                  for peer in peer_storages:
                      peer_meta = (peer.get("metadata") or {})
                      if (peer_meta.get("namespace") or ns) != ns:
                          continue
                      if (peer_meta.get("name") or "") == meta.get("name"):
                          continue
                      granted = _bucket_grants_access(peer, bucket, principal)
                      if granted is not None:
                          break
                  if granted:
                      policies.append(f"{principal}.{bucket}")

              interval, max_to_keep = _get_rollover(spec)
              now = datetime.now(timezone.utc)
              suffixes = _suffixes(now, interval, max_to_keep)

              for suf in suffixes:
                  user_name = f"{principal}{suf}"
                  key = f"user-{user_name}"
                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": ns,
                          "annotations": {
                              "crossplane.io/composition-resource-name": key,
                          }
                      },
                      "spec": {
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "minio.crossplane.io/v1",
                                  "kind": "User",
                                  "metadata": {
                                      "name": user_name,
                                  },
                                  "spec": {
                                      "forProvider": {"userName": user_name, "policies": policies},
                                      "providerConfigRef": {"name": "provider-minio"},
                                      "writeConnectionSecretToRef": {"name": user_name, "namespace": ns}
                                  }
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                      }
                  })

              current_user_name = f"{principal}{suffixes[0] if suffixes else '-1'}"
              obs_key = f"observe-secret-{principal}"
              rsp.desired.resources[obs_key].ready = fnv1.READY_TRUE
              rsp.desired.resources[obs_key].resource.update({
                  "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                  "kind": "Object",
                  "metadata": {
                      "name": obs_key,
                      "namespace": ns,
                      "annotations": {
                          "crossplane.io/composition-resource-name": obs_key,
                      }
                  },
                  "spec": {
                      "managementPolicies": ["Observe"],
                      "forProvider": {
                          "manifest": {
                              "apiVersion": "v1",
                              "kind": "Secret",
                              "metadata": {
                                  "name": current_user_name,
                                  "namespace": ns,
                              }
                          }
                      },
                      "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                  }
              })

    - step: manage-current-secret
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          import base64

          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          ENVIRONMENT_KEY = "apiextensions.crossplane.io/environment"

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def _b64(value):
              return base64.b64encode(str(value).encode("utf-8")).decode("utf-8")

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ctx = _to_dict(req.context)
              env = (ctx.get(ENVIRONMENT_KEY) or {})
              storage_env = (env.get("storage") or {})
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"
              principal = (spec.get("principal") or meta.get("name") or "<principal-missing>").strip()

              observed_resources = getattr(req.observed, "resources", {}) or {}
              obs_key = f"observe-secret-{principal}"
              oc = observed_resources.get(obs_key)

              if not oc or not getattr(oc, "resource", None):
                  return

              od = _to_dict(oc.resource)
              st = (od.get("status") or {})
              manifest = ((st.get("atProvider") or {}).get("manifest") or {})
              data = manifest.get("data") or {}
              if not isinstance(data, dict) or not data:
                  return

              endpoint = (storage_env.get("endpoint") or "").strip()
              region = (storage_env.get("region") or "").strip()
              force_path_style = storage_env.get("force_path_style")
              if endpoint:
                  data["AWS_ENDPOINT_URL"] = _b64(endpoint)
              if region:
                  data["AWS_REGION"] = _b64(region)
              if force_path_style not in (None, ""):
                  data["AWS_S3_FORCE_PATH_STYLE"] = _b64(force_path_style)

              key = f"secret-{principal}"
              secret_name = f"{principal}"
              rsp.desired.resources[key].resource.update({
                  "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                  "kind": "Object",
                  "metadata": {
                      "name": key,
                      "namespace": ns,
                      "annotations": {
                          "crossplane.io/composition-resource-name": key,
                      }
                  },
                  "spec": {
                      "forProvider": {
                          "manifest": {
                              "apiVersion": "v1",
                              "kind": "Secret",
                              "metadata": {
                                  "name": secret_name,
                                  "namespace": ns,
                              },
                              "type": "Opaque",
                              "data": data,
                          }
                      },
                      "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                  }
              })

    - step: manage-lifecycle-rules
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from datetime import datetime
          import shlex

          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          ENVIRONMENT_KEY = "apiextensions.crossplane.io/environment"

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def _normalize_target(target: str) -> str | None:
              value = (target or "").strip()
              if not value:
                  return None
              if value == "*":
                  return ""
              if "*" in value[:-1]:
                  return None
              if value.endswith("*"):
                  value = value[:-1]
              return value.lstrip("/")

          def _normalize_after(value: str) -> str:
              rel = (value or "").strip()
              if rel.startswith("+"):
                  rel = rel[1:]
              if not rel:
                  return rel
              unit = rel[-1]
              if unit in ("S", "s", "M", "m", "H", "h", "D", "d", "W", "w"):
                  return rel[:-1] + unit.lower()
              return rel

          def _parse_at_epoch(value: str) -> int | None:
              timestamp = (value or "").strip()
              if not timestamp:
                  return None
              if timestamp.endswith("Z"):
                  timestamp = timestamp[:-1] + "+00:00"
              try:
                  return int(datetime.fromisoformat(timestamp).timestamp())
              except Exception:
                  return None

          def _build_script(bucket: str, rule: dict) -> str:
              mode = (rule.get("mode") or "").strip()
              target = _normalize_target(rule.get("target") or "")
              remote_path = bucket if not target else f"{bucket}/{target}"
              remote = shlex.quote(f"storage:{remote_path}")
              target_display = target or "*"

              min_age = (rule.get("minAge") or "").strip()
              at = (rule.get("at") or "").strip()
              if min_age:
                  min_age = _normalize_after(min_age)
                  action = "lsf" if mode == "Notify" else "delete"
                  recursive = " --recursive" if mode == "Notify" else ""
                  return "\n".join([
                      "#!/bin/sh",
                      "set -eu",
                      f"exec rclone {action} {remote}{recursive} --min-age {shlex.quote(min_age)} --fast-list --s3-no-check-bucket",
                  ]) + "\n"

              at_epoch = _parse_at_epoch(at)
              if at_epoch is None:
                  return "\n".join([
                      "#!/bin/sh",
                      "set -eu",
                      f"echo {shlex.quote(f'Invalid lifecycle timestamp for {bucket}/{target_display}; skipping.')}",
                  ]) + "\n"
              return "\n".join([
                  "#!/bin/sh",
                  "set -eu",
                  'now="$(date -u +%s)"',
                  f'cutoff="{at_epoch}"',
                  'if [ "$now" -lt "$cutoff" ]; then',
                  "  exit 0",
                  "fi",
                  f"exec rclone {'lsf' if mode == 'Notify' else 'delete'} {remote}{' --recursive' if mode == 'Notify' else ''} --fast-list --s3-no-check-bucket",
              ]) + "\n"

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              ctx = _to_dict(req.context)
              env = (ctx.get(ENVIRONMENT_KEY) or {})
              storage_env = (env.get("storage") or {})
              ns = (meta.get("labels", {}) or {}).get("crossplane.io/claim-namespace") or meta.get("namespace") or "default"
              principal = (spec.get("principal") or meta.get("name") or "<principal-missing>").strip()

              rules = []
              for bucket_cfg in (spec.get("buckets") or []):
                  bucket = (bucket_cfg.get("bucketName") or "").strip()
                  if not bucket:
                      continue
                  for index, rule in enumerate(bucket_cfg.get("lifecycleRules") or [], start=1):
                      target = _normalize_target(rule.get("target") or "")
                      if target is None:
                          continue
                      rules.append({
                          "bucket": bucket,
                          "index": index,
                          "target": target,
                          "mode": (rule.get("mode") or "").strip(),
                          "minAge": (rule.get("minAge") or "").strip(),
                          "at": (rule.get("at") or "").strip(),
                      })

              if not rules:
                  return

              endpoint = (storage_env.get("endpoint") or "").strip() or "http://default-hl.minio:9000"
              storage_type = (storage_env.get("type") or "").strip() or "s3"
              storage_provider = (storage_env.get("provider") or "").strip() or "Minio"
              storage_region = (storage_env.get("region") or "").strip()
              lifecycle = (storage_env.get("lifecycle") or {})
              schedule = (lifecycle.get("schedule") or "").strip() or "17 2 * * *"
              force_path_style = storage_env.get("force_path_style")
              if force_path_style in (None, ""):
                  force_path_style = "true"
              else:
                  force_path_style = str(force_path_style)
              image = "rclone/rclone:1.69"
              for package in (env.get("packages") or []):
                  if (package.get("name") or "").strip() != "rclone":
                      continue
                  for file_entry in (package.get("files") or []):
                      image_url = (((file_entry.get("image") or {}).get("url")) or "").strip()
                      if image_url:
                          image = image_url
                          break
                  break

              scripts = {}
              containers = []
              for idx, rule in enumerate(rules, start=1):
                  key = f"rule-{idx:02d}.sh"
                  display_target = rule["target"] or "*"
                  scripts[key] = _build_script(rule["bucket"], rule)
                  container = {
                      "name": f"lifecycle-{idx:02d}",
                      "image": image,
                      "imagePullPolicy": "IfNotPresent",
                      "command": ["/bin/sh", "/opt/lifecycle/run.sh"],
                      "env": [
                          {"name": "RCLONE_CONFIG_STORAGE_TYPE", "value": storage_type},
                          {"name": "RCLONE_CONFIG_STORAGE_PROVIDER", "value": storage_provider},
                          {"name": "RCLONE_CONFIG_STORAGE_ENDPOINT", "value": endpoint},
                          {"name": "RCLONE_CONFIG_STORAGE_FORCE_PATH_STYLE", "value": force_path_style},
                          {"name": "RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID", "valueFrom": {"secretKeyRef": {"name": principal, "key": "AWS_ACCESS_KEY_ID"}}},
                          {"name": "RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY", "valueFrom": {"secretKeyRef": {"name": principal, "key": "AWS_SECRET_ACCESS_KEY"}}},
                          {"name": "STORAGE_LIFECYCLE_BUCKET", "value": rule["bucket"]},
                          {"name": "STORAGE_LIFECYCLE_TARGET", "value": display_target},
                      ],
                      "volumeMounts": [
                          {"name": "lifecycle-scripts", "mountPath": "/opt/lifecycle/run.sh", "subPath": key, "readOnly": True}
                      ],
                      "resources": {
                          "requests": {"cpu": "50m", "memory": "64Mi"},
                          "limits": {"cpu": "250m", "memory": "256Mi"},
                      },
                  }
                  if storage_region:
                      container["env"].append({"name": "RCLONE_CONFIG_STORAGE_REGION", "value": storage_region})
                  containers.append(container)

              config_key = f"lifecycle-config-{principal}"
              config_name = f"{principal}-lifecycle"
              rsp.desired.resources[config_key].resource.update({
                  "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                  "kind": "Object",
                  "metadata": {
                      "name": config_key,
                      "namespace": ns,
                      "annotations": {"crossplane.io/composition-resource-name": config_key}
                  },
                  "spec": {
                      "forProvider": {
                          "manifest": {
                              "apiVersion": "v1",
                              "kind": "ConfigMap",
                              "metadata": {
                                  "name": config_name,
                                  "namespace": ns,
                              },
                              "data": scripts,
                          }
                      },
                      "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                  }
              })

              cron_key = f"lifecycle-cron-{principal}"
              cron_name = f"{principal}-lifecycle"
              rsp.desired.resources[cron_key].resource.update({
                  "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                  "kind": "Object",
                  "metadata": {
                      "name": cron_key,
                      "namespace": ns,
                      "annotations": {"crossplane.io/composition-resource-name": cron_key}
                  },
                  "spec": {
                      "forProvider": {
                          "manifest": {
                              "apiVersion": "batch/v1",
                              "kind": "CronJob",
                              "metadata": {
                                  "name": cron_name,
                                  "namespace": ns,
                                  "labels": {
                                      "app.kubernetes.io/name": "storage-lifecycle",
                                      "storages.pkg.internal/principal": principal,
                                  }
                              },
                              "spec": {
                                  "schedule": schedule,
                                  "concurrencyPolicy": "Forbid",
                                  "successfulJobsHistoryLimit": 1,
                                  "failedJobsHistoryLimit": 1,
                                  "jobTemplate": {
                                      "spec": {
                                          "template": {
                                              "spec": {
                                                  "automountServiceAccountToken": False,
                                                  "restartPolicy": "OnFailure",
                                                  "containers": containers,
                                                  "volumes": [
                                                      {
                                                          "name": "lifecycle-scripts",
                                                          "configMap": {
                                                              "name": config_name,
                                                              "defaultMode": 493,
                                                          }
                                                      }
                                                  ],
                                              }
                                          }
                                      }
                                  }
                              }
                          }
                      },
                      "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"}
                  }
              })

    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: crossplane-contrib-function-auto-ready
