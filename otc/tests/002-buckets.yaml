apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: lifecycle-config-s-jeff
  labels:
    crossplane.io/composite: s-jeff
  name: lifecycle-config-s-jeff
  namespace: default
  ownerReferences:
  - apiVersion: pkg.internal/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: Storage
    name: s-jeff
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: v1
      data:
        rule-01.sh: |
          #!/bin/sh
          set -eu
          exec rclone delete storage:s-jeff-shared/tmp/ --min-age 12h --fast-list --s3-no-check-bucket
        rule-02.sh: |
          #!/bin/sh
          set -eu
          exec rclone lsf storage:s-jeff-shared/scratch/ --recursive --min-age 1w --fast-list --s3-no-check-bucket
      kind: ConfigMap
      metadata:
        name: s-jeff-lifecycle
        namespace: default
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: lifecycle-cron-s-jeff
  labels:
    crossplane.io/composite: s-jeff
  name: lifecycle-cron-s-jeff
  namespace: default
  ownerReferences:
  - apiVersion: pkg.internal/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: Storage
    name: s-jeff
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        labels:
          app.kubernetes.io/name: storage-lifecycle
          storages.pkg.internal/principal: s-jeff
        name: s-jeff-lifecycle
        namespace: default
      spec:
        concurrencyPolicy: Forbid
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                automountServiceAccountToken: false
                containers:
                - command:
                  - /bin/sh
                  - /opt/lifecycle/run.sh
                  env:
                  - name: RCLONE_CONFIG_STORAGE_TYPE
                    value: s3
                  - name: RCLONE_CONFIG_STORAGE_PROVIDER
                    value: Other
                  - name: RCLONE_CONFIG_STORAGE_ENDPOINT
                    value: https://obs.eu-nl.otc.t-systems.com
                  - name: RCLONE_CONFIG_STORAGE_REGION
                    value: eu-nl
                  - name: RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        key: AWS_ACCESS_KEY_ID
                        name: s-jeff
                  - name: RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        key: AWS_SECRET_ACCESS_KEY
                        name: s-jeff
                  - name: STORAGE_LIFECYCLE_BUCKET
                    value: s-jeff-shared
                  - name: STORAGE_LIFECYCLE_TARGET
                    value: tmp/
                  image: rclone/rclone:1.69
                  imagePullPolicy: IfNotPresent
                  name: lifecycle-01
                  resources:
                    limits:
                      cpu: 250m
                      memory: 256Mi
                    requests:
                      cpu: 50m
                      memory: 64Mi
                  volumeMounts:
                  - mountPath: /opt/lifecycle/run.sh
                    name: lifecycle-scripts
                    readOnly: true
                    subPath: rule-01.sh
                - command:
                  - /bin/sh
                  - /opt/lifecycle/run.sh
                  env:
                  - name: RCLONE_CONFIG_STORAGE_TYPE
                    value: s3
                  - name: RCLONE_CONFIG_STORAGE_PROVIDER
                    value: Other
                  - name: RCLONE_CONFIG_STORAGE_ENDPOINT
                    value: https://obs.eu-nl.otc.t-systems.com
                  - name: RCLONE_CONFIG_STORAGE_REGION
                    value: eu-nl
                  - name: RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID
                    valueFrom:
                      secretKeyRef:
                        key: AWS_ACCESS_KEY_ID
                        name: s-jeff
                  - name: RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        key: AWS_SECRET_ACCESS_KEY
                        name: s-jeff
                  - name: STORAGE_LIFECYCLE_BUCKET
                    value: s-jeff-shared
                  - name: STORAGE_LIFECYCLE_TARGET
                    value: scratch/
                  image: rclone/rclone:1.69
                  imagePullPolicy: IfNotPresent
                  name: lifecycle-02
                  resources:
                    limits:
                      cpu: 250m
                      memory: 256Mi
                    requests:
                      cpu: 50m
                      memory: 64Mi
                  volumeMounts:
                  - mountPath: /opt/lifecycle/run.sh
                    name: lifecycle-scripts
                    readOnly: true
                    subPath: rule-02.sh
                restartPolicy: OnFailure
                volumes:
                - configMap:
                    defaultMode: 493
                    name: s-jeff-lifecycle
                  name: lifecycle-scripts
        schedule: 17 2 * * *
        successfulJobsHistoryLimit: 1
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
